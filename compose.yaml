---
services:
  proxy:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  serveur1:
    image: httpd:alpine
    volumes:
      - ./serveur1/html:/usr/local/apache2/htdocs
  serveur2:
    image: httpd:alpine
    volumes:
      - ./serveur2/html:/usr/local/apache2/htdocs
  php:
    build: './php/'
    networks:
      - backend
    environment:
      - DB_USER=root
      - DB_PASSWD=rootpassword
    volumes:
      - ./serveur1/html:/usr/local/apache2/htdocs
      - ./serveur2/html:/usr/local/apache2/htdocs
  mysql:
    image: mysql:latest
    restart: always
    networks:
      - backend
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - dbdata:/var/lib/mysql

networks:
  frontend:
  backend:
volumes:
  dbdata:
